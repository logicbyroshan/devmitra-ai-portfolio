{% load static %}
<!-- ── Sidebar ─────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
    <!-- Header / Logo -->
    <div class="sidebar-header">
        <a href="{% url 'dashboard:index' %}" class="logo">
            <img src="{% static 'dashboard/img/logo.png' %}" alt="Admin Logo">
            <span class="logo-text">Admin</span>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="nav-links">
        <ul>

            <!-- Dashboard -->
            <li class="{% if active_nav == 'dashboard' %}active{% endif %}">
                <a href="{% url 'dashboard:index' %}">
                    <i class="fa-solid fa-gauge"></i>
                    <span class="link-text">Dashboard</span>
                </a>
            </li>

            <!-- Portfolio -->
            <li class="{% if active_nav == 'projects' or active_nav == 'experience' or active_nav == 'skills' or active_nav == 'achievements' or active_nav == 'faqs' or active_nav == 'categories' %}active{% endif %}">
                <a href="{% url 'dashboard:projects_list' %}">
                    <i class="fa-solid fa-briefcase"></i>
                    <span class="link-text">Portfolio</span>
                </a>
            </li>

            <!-- Blog -->
            <li class="{% if active_nav == 'blog' or active_nav == 'blog_categories' %}active{% endif %}">
                <a href="{% url 'dashboard:blog_list' %}">
                    <i class="fa-solid fa-newspaper"></i>
                    <span class="link-text">Articles</span>
                </a>
            </li>

            <!-- Resources -->
            <li class="{% if active_nav == 'resources' or active_nav == 'resource_categories' or active_nav == 'settings_resources' %}active{% endif %}">
                <a href="{% url 'dashboard:resources_list' %}">
                    <i class="fa-solid fa-book-open"></i>
                    <span class="link-text">Resources</span>
                </a>
            </li>

            <!-- Contacts -->
            <li class="{% if active_nav == 'contacts' or active_nav == 'newsletter' %}active{% endif %}">
                <a href="{% url 'dashboard:contacts_list' %}">
                    <i class="fa-solid fa-envelope"></i>
                    <span class="link-text">Contacts</span>
                </a>
            </li>

            <!-- AI Panel -->
            <li class="{% if active_nav == 'ai' or active_nav == 'ai_queries' or active_nav == 'ai_context' %}active{% endif %}">
                <a href="{% url 'dashboard:ai_queries_list' %}">
                    <i class="fa-solid fa-robot"></i>
                    <span class="link-text">AI Panel</span>
                </a>
            </li>

            <!-- Settings -->
            <li
                class="{% if active_nav == 'settings' or active_nav == 'settings_site' or active_nav == 'settings_about' or active_nav == 'settings_resume' or active_nav == 'settings_notifications' or active_nav == 'email_templates' %}active{% endif %}">
                <a href="{% url 'dashboard:settings_site' %}">
                    <i class="fa-solid fa-gear"></i>
                    <span class="link-text">Settings</span>
                </a>
            </li>

        </ul>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
        <a href="/" target="_blank" rel="noopener noreferrer" class="user-profile-link" title="View Website">
            <div class="user-profile">
                <div
                    style="width:36px;height:36px;background:var(--border);border-radius:var(--r-md);display:grid;place-items:center;font-size:0.85rem;flex-shrink:0;">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="user-details">
                    <span class="user-name">{{ request.user.get_full_name|default:request.user.username }}</span>
                    <span class="user-role">{% if request.user.is_superuser %}Superuser{% else %}Staff{% endif %}</span>
                </div>
            </div>
        </a>
        <form method="post" action="{% url 'dashboard:logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="logout-link" title="Logout">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </form>
    </div>
</aside>
